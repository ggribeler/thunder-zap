services:
  - type: web
    name: thunder-zap-api
    runtime: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: EMBEDDED_SIGNUP_CONFIG_ID
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /opt/render/project/data/thunder.db
    disk:
      name: thunder-data
      mountPath: /opt/render/project/data
      sizeGB: 1

  - type: web
    name: thunder-zap-web
    runtime: node
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: thunder-zap-api
          type: web
          property: host
      - key: NEXT_PUBLIC_META_APP_ID
        sync: false
      - key: NEXT_PUBLIC_EMBEDDED_SIGNUP_CONFIG_ID
        sync: false
